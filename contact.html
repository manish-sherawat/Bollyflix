<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="movie styles.css">
</head>

<body>
    <header>
        <a href="index.html">
            <h1>BOLLYFLIX - Contact Us</h1>
        </a>
    </header>

    <main>
        <div class="container">
            <h2>Contact Us</h2>
            <p>If you have any questions, comments, or concerns, please feel free to reach out to us. We value your feedback and are here to help!</p>

            <h3>Contact Information</h3>
            <p>Email: support@bollyflix.com</p>
            <p>Phone: +1 (123) 456-7890</p>

            <h3>Contact Form</h3>
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="subject">Subject:</label>
                <input type="text" id="subject" name="subject" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; Bollyflix. All rights reserved.</p>
    </footer>
</body>
</html>
